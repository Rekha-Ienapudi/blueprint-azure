name: Deploy Azure Infra (Terraform Only)

on:
  workflow_dispatch:
    inputs:
      subscription_id:
        description: "Azure Subscription ID"
        required: true
      tf_vars:
        description: |
          Terraform variables (key=value per line)
          Only override what you need.
        required: false
        type: string

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Terraform 1.5.7
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7
        terraform_wrapper: false

    - name: Azure CLI interactive login
      run: |
        echo "Login using device code:"
        az login --use-device-code
        az account set --subscription "${{ github.event.inputs.subscription_id }}"

    - name: Parse variables.tf → JSON schema
      id: parse
      working-directory: infra
      run: |
        echo "Parsing variables.tf"

        # Extract variable blocks into JSON
        awk '
          /variable "/ {
            gsub(/"/, "", $2)
            var=$2
          }
          /type *=/ {
            sub(/.*type *= */, "")
            type=$0
          }
          /default *=/ {
            sub(/.*default *= */, "")
            def=$0
          }
          /^}/ {
            printf("{\"name\":\"%s\",\"type\":%s,\"default\":%s}\n", var, type, (def==""?"null":def))
            var=""; type=""; def=""
          }
        ' variables.tf > schema.json

        echo "Generated schema:"
        cat schema.json

    - name: Build workflow.auto.tfvars with validation
      working-directory: infra
      run: |
        echo "Building tfvars file"

        # Convert user input to JSON
        echo "${{ github.event.inputs.tf_vars }}" | awk -F= '{printf "{\"%s\":\"%s\"}\n", $1, $2}' > user.json

        echo "User input JSON:"
        cat user.json

        # Validate and merge
        echo "" > workflow.auto.tfvars

        while read line; do
          name=$(echo "$line" | jq -r '.name')
          type=$(echo "$line" | jq -r '.type')
          def=$(echo "$line" | jq -r '.default')

          # Check if user provided value
          user_val=$(jq -r --arg n "$name" 'select(.[$n]) | .[$n]' user.json 2>/dev/null || echo "")

          if [ -z "$user_val" ] && [ "$def" = "null" ]; then
            echo "ERROR: Missing required variable: $name"
            exit 1
          fi

          final_val="$user_val"
          if [ -z "$final_val" ]; then
            final_val="$def"
          fi

          # Type validation
          case "$type" in
            string)
              if ! echo "$final_val" | grep -q '^".*"$'; then
                final_val="\"$final_val\""
              fi
              ;;
            number)
              if ! echo "$final_val" | grep -Eq '^[0-9]+$'; then
                echo "ERROR: Variable $name must be a number"
                exit 1
              fi
              ;;
            bool)
              if ! echo "$final_val" | grep -Eq '^(true|false)$'; then
                echo "ERROR: Variable $name must be true or false"
                exit 1
              fi
              ;;
          esac

          echo "$name = $final_val" >> workflow.auto.tfvars

        done < schema.json

        echo "Final workflow.auto.tfvars:"
        cat workflow.auto.tfvars

    - name: Terraform Init
      working-directory: infra
      run: terraform init

    - name: Terraform Plan
      working-directory: infra
      run: terraform plan -var-file="workflow.auto.tfvars" -var-file="tags.auto.tfvars"

  terraform-apply:
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment:
      name: manual-approval

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Terraform 1.5.7
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7
        terraform_wrapper: false

    - name: Azure CLI interactive login
      run: |
        echo "Login using device code:"
        az login --use-device-code
        az account set --subscription "${{ github.event.inputs.subscription_id }}"

    - name: Terraform Init
      working-directory: infra
      run: terraform init

    - name: Terraform Apply
      working-directory: infra
      run: terraform apply -auto-approve -var-file="workflow.auto.tfvars" -var-file="tags.auto.tfvars"
