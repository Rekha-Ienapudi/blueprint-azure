<!DOCTYPE html>
<html>

<head>

<title>Resource Groups</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

<div class="card shadow-lg p-4">

<h2 class="text-primary">
Application Resource Groups
</h2>

<div class="alert alert-info">

Total RGs:
<b>{{ rgs|length }}</b>

</div>

<table class="table table-striped table-hover">

<tr>
<th>Name</th>
<th>Location</th>
<th>Action</th>
</tr>

{% for rg in rgs %}

<tr>

<td>{{ rg["name"] }}</td>
<td>{{ rg["location"] }}</td>

<td>

<form method="POST">

<input type="hidden"
       name="action"
       value="delete_rg">

<input type="hidden"
       name="subscription_id"
       value="{{ subscription_id }}">

<input type="hidden"
       name="rg_name"
       value="{{ rg['name'] }}">

<button
class="btn btn-danger"
onclick="return confirm('Delete Resource Group?')">

Delete

</button>

</form>

</td>

</tr>

{% endfor %}

</table>

<a href="/"
   class="btn btn-primary">

Back Home

</a>

</div>

</div>

</body>
</html>
